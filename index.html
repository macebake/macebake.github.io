<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>macey: hey</title>
    <link rel="icon" href="./assets/airplane.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./styles.css?v=chat-ui-10" />
  </head>
  <body>
    <main class="shell">
      <canvas
        id="sky-canvas"
        class="sky-canvas"
        aria-label="Retro-styled view of the sky from the grass while planes pass overhead"
      ></canvas>
      <div class="grain"></div>
      <div class="scanlines"></div>
      <div class="bloom"></div>

      <section class="ui-panel">
        <div class="chat-container">
          <div class="chat-line">
            <span class="timestamp"></span> macey: hey<div class="cursor" id="cursor1"></div>
          </div>
          <div class="chat-line">
            <span class="timestamp"></span> macey: nice to see you<div class="cursor" id="cursor2"></div>
          </div>
          <div class="chat-line">
            <span class="timestamp"></span> macey: have a look around 🤠<div class="cursor" id="cursor3"></div>
          </div>
          <div class="typing-indicator" id="typing-indicator">macey is typing<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
        </div>

        <div class="controls-row">
          <div class="social-links">
            <a href="https://x.com/macebake" target="_blank" rel="noreferrer" aria-label="x">
              <img src="./assets/x.svg" alt="" />
            </a>
            <a href="https://www.linkedin.com/in/maceybaker/" target="_blank" rel="noreferrer" aria-label="linkedin">
              <img src="./assets/li.svg" alt="" />
            </a>
            <button type="button" id="email-copy" class="email-copy" aria-label="copy email address">
              <img src="./assets/email.svg" alt="" />
              <span class="email-copied" id="email-copied">email address copied</span>
            </button>
            <button type="button" id="blog-toggle" class="blog-toggle" aria-expanded="false">blog</button>
          </div>

          <label class="toggle-row" for="show-all-links">
            <input type="checkbox" id="show-all-links" />
            <span>show all links</span>
          </label>
        </div>
      </section>

      <section class="mobile-stack" id="mobile-stack" aria-label="Mobile navigation">
        <div class="mobile-panel mobile-links-panel">
          <p class="mobile-label">links</p>
          <nav class="mobile-link-list" id="mobile-link-list" aria-label="Site links"></nav>
        </div>

        <div class="mobile-panel">
          <details class="mobile-blog-toggle">
            <summary>blog archive</summary>
            <div class="mobile-blog-tree" id="mobile-blog-tree" aria-label="Blog archive"></div>
          </details>
        </div>
      </section>

      <aside class="blog-panel" id="blog-panel" aria-hidden="true">
        <div class="blog-panel-header">
          <span id="blog-panel-title">blog/archive</span>
          <button type="button" id="blog-close" class="blog-close" aria-label="close blog">x</button>
        </div>
        <div class="blog-panel-body">
          <div class="blog-archive-view" id="blog-archive-view">
            <div class="blog-tree" id="blog-tree" aria-label="Blog archive by date"></div>
          </div>
          <article class="blog-detail-view" id="blog-detail-view" hidden>
            <button type="button" class="blog-back" id="blog-back">&larr; back</button>
            <div class="blog-detail-content" id="blog-detail-content"></div>
          </article>
        </div>
      </aside>

      <nav class="link-strip" id="link-strip" aria-label="Site links"></nav>
    </main>

    <script src="./script.js?v=chat-ui-24"></script>
  </body>
</html>
